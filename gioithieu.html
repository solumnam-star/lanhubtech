<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANHUB TECH</title>
<style>
:root {
    --primary: #00aaff;
    --dark: #0a0f1c;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    color: white;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
        url("anh 8.jpg") center/cover no-repeat fixed;
    line-height: 1.6;
    overflow-x: hidden;
    scroll-behavior: smooth;
}

/* ===================== TOP BANNER ===================== */
.top-banner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 52px;
    background: linear-gradient(90deg, #0066ff, #00aaff, #0066ff, #00aaff);
    background-size: 200% 100%;
    overflow: hidden;
    z-index: 9999;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    animation: gradientMove 8s linear infinite;
}

.banner-text {
    white-space: nowrap;
    color: white;
    font-size: 18px;
    font-weight: bold;
    padding-left: 100%;
    animation: bannerMove 28s linear infinite;
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
}

@keyframes bannerMove {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

.top-banner:hover .banner-text {
    animation-play-state: paused;
}

/* ===================== DOWNLOAD COUNTER ===================== */
.download-card {
    position: relative;
}
.download-count {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    margin-bottom: 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #dff4ff;
    font-size: 0.95rem;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,0,0,0.35), inset 0 1px 2px rgba(255,255,255,0.15);
}
.download-count span {
    color: #00d9ff;
    font-size: 1rem;
}

/* ===================== MENU ===================== */
.menu {
    position: fixed;
    top: 50%;
    left: 40px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;

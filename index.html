<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>LANHUB TECH</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background:
      linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
      url("logo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat; /* Không cho hình nền lặp lại */
    background-attachment: fixed; /* Khóa chết hình nền không bị cuộn */
    color: white;
    font-family: Arial;
}

/* KHUNG CHỨA NÚT (Tối ưu để tự động căn giữa trên điện thoại) */
.menu {
    position: absolute;
    top: 35%;
    /* Sửa lại đoạn này để trên màn hình nào cũng ở vị trí đẹp, không dùng cố định 1600px */
    right: 5%; 
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 90%;
}

.menu a {
    text-decoration: none;
    display: block;
}

/* NÚT BẤM MỚI */
.menu button {
    width: 240px; /* Đổi sang 240px (vừa vặn trên mọi điện thoại và máy tính) */
    height: 55px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    background: rgba(0, 102, 255, 0.15); /* Tăng độ đậm một chút để dễ nhìn */
    backdrop-filter: blur(5px);
    box-shadow:
        0 6px 15px rgba(0,0,0,0.5),
        inset 0 2px 4px rgba(255,255,255,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.2s;
}

.menu button:hover {
    transform: scale(1.05);
    box-shadow:
        0 8px 20px rgba(0,0,0,0.6),
        inset 0 2px 5px rgba(255,255,255,0.5);
}

.menu button:active {
    transform: scale(0.97);
}

/* 2. THÊM ĐOẠN NÀY: Dành riêng cho màn hình Điện thoại */
@media (max-width: 768px) {
    .menu {
        /* Trên điện thoại đưa menu ra chính giữa màn hình cho dễ bấm */
        left: 50%;
        right: auto;
        transform: translate(-50%, -50%); 
    }
}
</style>
</head>

<body>

<div class="menu">

    <a href="test.html">
        <button> GIỚI THIỆU </button>
    </a>

    <a href="index.html">
        <button> TRANG CHỦ </button>
    </a>

    <a href="gioithieu.html#tinhnang">
        <button> TÍNH NĂNG </button>
    </a>

    <a href="gioithieu.html#download">
        <button> TẢI VỀ </button>
    </a>
    
    <a href="gioithieu.html#lienhe">
        <button>LIÊN HỆ</button>
    </a>

</div>

</div>

</body>
</html>

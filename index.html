<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LANHUB TECH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            min-height: 100dvh; /* Tốt hơn cho mobile */
            background:
                linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.45)),
                url("logo.png") center/cover no-repeat;
            background-attachment: scroll; /* Quan trọng: thay fixed */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 280px;
            padding: 0 20px;
        }

        .menu button {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: rgba(0, 102, 255, 0.25);
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.5),
                        inset 0 2px 4px rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.25);
            transition: all 0.25s ease;
        }

        .menu button:hover,
        .menu button:active {
            transform: scale(1.04);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        /* Mobile tối ưu hơn */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
            }
            .menu {
                max-width: 92%;
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="gioithieu.html"><button>GIỚI THIỆU</button></a>
        <a href="index.html"><button>TRANG CHỦ</button></a>
        <a href="gioithieu.html#tinhnang"><button>TÍNH NĂNG</button></a>
        <a href="gioithieu.html#download"><button>TẢI VỀ</button></a>
        <a href="gioithieu.html#lienhe"><button>LIÊN HỆ</button></a>
    </div>
</body>
</html>

<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>LANHUB TECH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            color: white;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
                url("logo.png") center/cover no-repeat fixed;
            overflow-x: hidden;
        }

        /* ===================== TOP BANNER ===================== */
        .top-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 58px;
            background: linear-gradient(90deg, #0066ff, #00aaff, #0066ff, #00aaff);
            background-size: 200% 100%;
            overflow: hidden;
            z-index: 9999;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            animation: gradientMove 8s linear infinite;
        }

        .banner-text {
            white-space: nowrap;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding-left: 100%;
            animation: bannerMove 32s linear infinite;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        @keyframes bannerMove {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .top-banner:hover .banner-text {
            animation-play-state: paused;
        }

        /* ===================== MENU ===================== */
        .menu {
            position: fixed;
            top: 50%;
            right: 5%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 1000;
            max-width: 90%;
        }

        .menu a {
            text-decoration: none;
            display: block;
        }

        .menu button {
            width: 240px;
            height: 58px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: rgba(0, 102, 255, 0.25);
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.5),
                        inset 0 2px 4px rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.25);
            transition: all 0.3s ease;
        }

        .menu button:hover {
            transform: scale(1.08);
            background: rgba(0, 140, 255, 0.45);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6),
                        0 0 20px rgba(0, 170, 255, 0.6);
        }

        /* Responsive Menu */
        @media (max-width: 768px) {
            .menu {
                left: 50%;
                right: auto;
                transform: translate(-50%, -50%);
            }
            .menu button {
                width: 220px;
                height: 54px;
                font-size: 15px;
            }
            .banner-text {
                font-size: 15px;
            }
        }

        /* Nội dung chính */
        .content {
            padding-top: 120px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 80px;
        }

        .hero-text h1 {
            font-size: 4.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 170, 255, 0.8);
        }

        .hero-text p {
            font-size: 1.4rem;
            max-width: 700px;
            margin: 0 auto 40px;
            color: #d0e6ff;
        }
    </style>

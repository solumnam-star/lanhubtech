<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LANHUB TECH</title>

<style>

body {
    margin: 0;
    padding: 0;
    height: 100vh;

    background:
      linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
      url("logo.png");

    background-size: cover;
    background-position: center;

    color: white;
    font-family: Arial;
}

/* KHUNG CHỨA NÚT */
.menu {
    position: absolute;
    top: 35%;
    left: 1600px;

    transform: translateY(-50%);

    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* NÚT BẤM */
.menu button {

    width: 6cm;
    height: 55px;

    border: none;
    border-radius: 14px;

    font-size: 16px;
    font-weight: bold;

    color: white;
    cursor: pointer;

    background: rgba(0, 102, 255, 0.2);

    backdrop-filter: blur(5px);

    box-shadow:
        0 6px 15px rgba(0,0,0,0.5),
        inset 0 2px 4px rgba(255,255,255,0.3);

    border: 1px solid rgba(255,255,255,0.2);

    transition: 0.2s;
}

/* HIỆU ỨNG DI CHUỘT */
.menu button:hover {
    transform: scale(1.05);

    box-shadow:
        0 8px 20px rgba(0,0,0,0.6),
        inset 0 2px 5px rgba(255,255,255,0.5);
}

/* HIỆU ỨNG NHẤN */
.menu button:active {
    transform: scale(0.97);
}

</style>

</head>

<body>

<div class="menu">

    <button>HOME</button>

    <button>SCAN</button>

    <button>SERVER</button>

    <button>CLIENT</button>

    <button>TOOLS</button>

    <button>ABOUT</button>

</div>

</body>
</html>
